  <style>
    :root {
      --navy: #003057; --navy-dark: #001F3D; --navy-deeper: #00152B;
      --blue: #0071CE; --blue-light: #4DA3E8; --blue-pale: #E8F2FC;
      --red: #D72638; --red-hover: #BF1F2E;
      --white: #FFFFFF; --off-white: #F5F7FA;
      --gray-100: #EEF0F3; --gray-200: #D5D9E0; --gray-400: #9BA3AF; --gray-600: #5A6270; --gray-800: #2D3239;
      --green: #1B874B;
      --shadow-md: 0 4px 12px rgba(0,48,87,0.10); --shadow-lg: 0 8px 28px rgba(0,48,87,0.14);
      --radius: 8px; --radius-lg: 12px; --transition: 0.25s ease;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      font-family: 'Source Sans 3', -apple-system, sans-serif;
      color: var(--gray-800); -webkit-font-smoothing: antialiased;
      line-height: 1.5; background: var(--white);
    }
    a { text-decoration: none; }
    .header {

      background: rgba(0,31,61,0.97);
      backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
      height: 68px; padding: 0 28px;
      display: flex; align-items: center;
      box-shadow: 0 2px 12px rgba(0,0,0,0.15);
    }
    .header-inner {
      max-width: 1140px; width: 100%; margin: 0 auto;
      display: flex; align-items: center; justify-content: space-between;
    }
    .header-logo-text {
      font-family: 'Source Sans 3', sans-serif;
      font-size: 22px; font-weight: 800; color: var(--white);
      letter-spacing: -0.5px; line-height: 1;
    }
    .header-logo-text span { color: var(--blue-light); }
    .header-logo-sub {
      font-size: 11px; font-weight: 700; color: rgba(255,255,255,0.5);
      text-transform: uppercase; letter-spacing: 1.5px; margin-top: 2px;
    }
    .header-nav { display: flex; align-items: center; gap: 28px; list-style: none; }
    .header-nav a {
      color: rgba(255,255,255,0.8); font-size: 14px; font-weight: 600;
      transition: color var(--transition); letter-spacing: 0.2px;
    }
    .header-nav a:hover { color: var(--white); }
    .header-right { display: flex; align-items: center; gap: 16px; }
    .header-phone {
      display: flex; align-items: center; gap: 8px;
      color: var(--white); font-size: 15px; font-weight: 700;
      transition: color var(--transition);
    }
    .header-phone:hover { color: var(--blue-light); }
    .header-cta {
      background: var(--red); color: var(--white);
      padding: 9px 22px; border-radius: 6px;
      font-size: 13px; font-weight: 800; text-transform: uppercase;
      letter-spacing: 0.5px; transition: all var(--transition);
      box-shadow: 0 2px 8px rgba(215,38,56,0.3);
    }
    .header-cta:hover { background: var(--red-hover); transform: translateY(-1px); }

    .hamburger {
      display: none; background: none; border: none; cursor: pointer; padding: 4px;
      flex-direction: column; gap: 5px;
    }
    .hamburger span {
      display: block; width: 22px; height: 2px; background: #fff;
      border-radius: 2px; transition: all 0.3s ease;
    }
    .hamburger.active span:nth-child(1) { transform: rotate(45deg) translate(5px, 5px); }
    .hamburger.active span:nth-child(2) { opacity: 0; }
    .hamburger.active span:nth-child(3) { transform: rotate(-45deg) translate(5px, -5px); }
    .mobile-menu {
      display: none; position: fixed; top: 60px; left: 0; right: 0; z-index: 999;
      background: rgba(0,21,43,0.98); padding: 20px 24px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.3);
      flex-direction: column;
    }
    .mobile-menu.active { display: flex; }
    .mobile-menu a {
      color: rgba(255,255,255,0.85); font-size: 16px; font-weight: 600;
      padding: 14px 0; border-bottom: 1px solid rgba(255,255,255,0.08);
    }
    .mobile-menu a:last-child { border-bottom: none; }
    .mobile-menu a:hover { color: var(--blue-light); }
    @media (max-width: 768px) {
      .header { padding: 0 16px; height: 60px; }
      .header-nav, .header-nmls { display: none; }
      .header-phone span { display: none; }
      .hamburger { display: flex; }
    }
    .hero {

      overflow: hidden; text-align: center;

    .hero-inner { max-width: 860px; margin: 0 auto; position: relative; z-index: 1; }
    .hero-eyebrow {

      background: rgba(0,113,206,0.18);
      border: 1px solid rgba(77,163,232,0.35);
      color: var(--blue-light);

      text-transform: uppercase; letter-spacing: 1.5px;
      padding: 7px 16px; border-radius: 100px; margin-bottom: 20px;
    }
    .hero h1 {
      font-family: 'Merriweather', Georgia, serif;
      font-size: clamp(32px, 4.5vw, 48px);
      font-weight: 900; line-height: 1.18;
      color: var(--white); letter-spacing: -0.3px; margin-bottom: 18px;
    }
    .hero h1 span { color: var(--blue-light); }
    .hero-sub {
      font-size: 18px; line-height: 1.7; color: rgba(255,255,255,0.8);
      max-width: 640px; margin: 0 auto 28px;
    }
    .hero-trust { display: flex; justify-content: center; gap: 28px; flex-wrap: wrap; }
    .hero-trust-item {
      display: flex; align-items: center; gap: 10px;
      color: rgba(255,255,255,0.9); font-size: 14px; font-weight: 600;
    }
    .hero-trust-icon {
      width: 32px; height: 32px; border-radius: 50%;
      background: rgba(0,113,206,0.25); border: 1px solid rgba(0,113,206,0.4);
      display: flex; align-items: center; justify-content: center;
    }
    @media (max-width: 768px) {
      .hero { padding: 100px 16px 50px; }
      .hero-sub { font-size: 16px; }
      .hero-trust { gap: 16px; }
    }
    .tools-section { padding: 80px 24px; background: var(--off-white); }
    .tools-inner { max-width: 1140px; margin: 0 auto; }
    .section-header { text-align: center; margin-bottom: 48px; }
    .section-header h2 {
      font-family: 'Merriweather', Georgia, serif;
      font-size: 32px; font-weight: 700; color: var(--navy);
      margin-bottom: 10px; letter-spacing: -0.3px;
    }
    .section-header p {
      color: var(--gray-600); font-size: 16px;
      max-width: 580px; margin: 0 auto;
    }
    .tools-grid {
      display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 24px;
    }
    .tool-card {
      background: var(--white);
      border: 2px solid var(--gray-100);
      border-radius: var(--radius-lg);
      padding: 32px 28px;
      transition: all var(--transition);
      display: flex; flex-direction: column;
    }
    .tool-card.available { cursor: pointer; }
    .tool-card.available:hover {
      border-color: var(--blue); box-shadow: var(--shadow-lg);
      transform: translateY(-4px);
    }
    .tool-card.coming-soon { opacity: 0.75; }
    .tool-badge {
      display: inline-flex; align-items: center;
      font-size: 11px; font-weight: 800;
      text-transform: uppercase; letter-spacing: 0.8px;
      padding: 5px 12px; border-radius: 100px;
      margin-bottom: 16px; align-self: flex-start;
    }
    .tool-badge.soon {
      background: var(--gray-100); color: var(--gray-600); border: 1px solid var(--gray-200);
    }
    .tool-badge.popular { background: var(--red); color: var(--white); }
    .tool-icon {
      width: 56px; height: 56px; border-radius: 12px;
      background: var(--blue-pale);
      display: flex; align-items: center; justify-content: center;
      margin-bottom: 18px;
    }
    .tool-icon svg { width: 28px; height: 28px; }
    .tool-card h3 {
      font-family: 'Merriweather', Georgia, serif;
      font-size: 22px; font-weight: 700; color: var(--navy);
      margin-bottom: 10px; line-height: 1.25; letter-spacing: -0.2px;
    }
